version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "9339:9339"
    volumes:
      - ./backend/chrome-profile-docker:/app/chrome-profile
      - ./backend/data:/app/data
    environment:
      - FC_ADMIN_TOKEN=flowcaptcha-admin-2024
      - FC_MAX_CONCURRENT=3
      - FC_HEADLESS=false
      - FC_DEFAULT_COOLDOWN=0
      - FC_DEFAULT_COOLDOWN_FAIL=120
      - FC_DEFAULT_WAIT_DELAY=3
      - FC_HOST=0.0.0.0
      - FC_PORT=9339
      - DISPLAY=:99
    restart: unless-stopped
    # Chrome needs shared memory
    shm_size: "512m"
